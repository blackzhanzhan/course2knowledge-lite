<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Course2Knowledge Lite</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Course2Knowledge Lite</p>
          <h1>Course Knowledge Workspace</h1>
        </div>
        <div class="status" id="status">Loading local store</div>
      </header>

      <section class="workspace" aria-label="Course workspace">
        <aside class="sidebar">
          <section class="import-panel" aria-label="Import Bilibili collection">
            <div class="panel-head">
              <h2>Import</h2>
              <button id="import-button" type="button" title="Import collection">Import</button>
            </div>
            <input
              id="import-url"
              type="url"
              value="https://space.bilibili.com/1112988584/lists/7726472?type=season"
              autocomplete="off"
            />
            <div id="import-receipt" class="import-receipt" aria-live="polite"></div>
          </section>
          <div class="panel-head">
            <h2>Courses</h2>
            <button id="refresh-button" type="button" title="Refresh courses">Refresh</button>
          </div>
          <div id="course-list" class="list"></div>
          <div id="coverage-panel" class="coverage-panel"></div>
        </aside>

        <section class="reader">
          <div class="panel-head reader-head">
            <div>
              <p class="eyebrow" id="course-meta">No course selected</p>
              <h2 id="lecture-title">Lecture Reader</h2>
            </div>
            <label class="select-label">
              Lecture
              <select id="lecture-select"></select>
            </label>
            <label class="select-label">
              Status
              <select id="progress-select">
                <option value="not_started">Not started</option>
                <option value="reading">Reading</option>
                <option value="read">Read</option>
              </select>
            </label>
          </div>
          <section class="guide-panel" aria-label="Guided learning">
            <div class="panel-head">
              <h2>Guided Learning</h2>
              <div class="guide-controls">
                <select id="guide-mode" aria-label="Guide mode">
                  <option value="continue">Continue</option>
                  <option value="walkthrough">Walkthrough</option>
                  <option value="self_check">Self-check</option>
                  <option value="recap">Recap</option>
                </select>
                <button id="guide-button" type="button" title="Run guide">Run</button>
              </div>
            </div>
            <div id="guide-output" class="guide-output"></div>
          </section>
          <div id="segments" class="segments"></div>
          <section class="cards-panel" aria-label="Knowledge cards">
            <div class="panel-head">
              <h2>Knowledge Cards</h2>
              <button id="cards-button" type="button" title="Generate cards from transcript">Generate</button>
            </div>
            <div id="cards-list" class="cards-list"></div>
          </section>
        </section>

        <aside class="tools">
          <section class="tool-panel">
            <div class="panel-head">
              <h2>Search</h2>
              <button id="search-button" type="button" title="Search transcript">Search</button>
            </div>
            <input id="search-input" type="search" value="RAG Agent" />
            <div id="search-results" class="result-list"></div>
          </section>

          <section class="tool-panel">
            <div class="panel-head">
              <h2>Q&A</h2>
              <button id="qa-button" type="button" title="Ask from transcript">Ask</button>
            </div>
            <textarea id="qa-input" rows="4">RAG 和 Agent 的区别是什么？</textarea>
            <div id="qa-answer" class="answer"></div>
          </section>

          <section class="tool-panel">
            <div class="panel-head">
              <h2>Notes</h2>
              <button id="note-button" type="button" title="Save note">Save</button>
            </div>
            <textarea id="note-input" rows="4" placeholder="Write a note for this lecture"></textarea>
            <div id="notes-list" class="result-list"></div>
          </section>

          <section class="tool-panel">
            <div class="panel-head">
              <h2>Bookmarks</h2>
            </div>
            <div id="bookmarks-list" class="result-list"></div>
          </section>
        </aside>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
